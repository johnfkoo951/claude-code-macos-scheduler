name: ClaudeScheduler
options:
  bundleIdPrefix: com.cmdspace
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  ClaudeScheduler:
    type: application
    platform: macOS
    sources:
      - path: ClaudeScheduler
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cmdspace.ClaudeScheduler
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: ClaudeScheduler
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 CMDSPACE. All rights reserved."
        INFOPLIST_KEY_CFBundleDisplayName: "Claude Scheduler"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
    entitlements:
      path: ClaudeScheduler/ClaudeScheduler.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
        com.apple.security.files.user-selected.read-write: true
